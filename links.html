<style>
  :root{--brand:#08518b;--brand-deep:#052f52;--gold:#C9A24B}
  *{box-sizing:border-box;margin:0}
  html,body{overflow-x:hidden}
  body{min-height:100dvh;font-family:"Segoe UI Rounded","SF Pro Rounded",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    color:#fff;background:
      radial-gradient(120% 80% at 50% -10%, rgba(255,255,255,.10), transparent 60%),
      linear-gradient(170deg,var(--brand) 0%, var(--brand-deep) 100%);
    background-attachment:fixed;
    display:flex;flex-direction:column;align-items:center;
    padding:calc(38px + env(safe-area-inset-top)) 20px calc(30px + env(safe-area-inset-bottom))}
  .col{width:100%;max-width:460px;display:flex;flex-direction:column;align-items:center}

  /* cabeçalho */
  .logo{width:112px;height:112px;border-radius:26px;background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.18);display:grid;place-items:center;overflow:hidden;
    box-shadow:0 12px 34px rgba(0,0,0,.28);margin-bottom:16px}
  .logo img{width:100%;height:100%;object-fit:contain;padding:12px}
  .logo svg{width:66px;height:66px}
  h1{font-size:25px;font-weight:800;letter-spacing:.3px;text-align:center}
  .tag{font-size:13px;letter-spacing:2.5px;text-transform:uppercase;opacity:.8;margin-top:2px;text-align:center}
  .bio{font-size:14.5px;opacity:.92;text-align:center;margin:14px 6px 4px;line-height:1.55;max-width:36ch}
  .live{display:inline-flex;align-items:center;gap:8px;background:rgba(30,158,106,.22);
    border:1px solid rgba(91,227,154,.5);color:#c9f6e0;padding:6px 14px;border-radius:999px;
    font-size:12px;font-weight:700;letter-spacing:.5px;margin-top:14px}
  .dot{width:8px;height:8px;border-radius:50%;background:#5BE39A;box-shadow:0 0 0 0 rgba(91,227,154,.7);animation:p 2s infinite}
  @keyframes p{to{box-shadow:0 0 0 9px rgba(91,227,154,0)}}

  /* botões de link */
  .links{width:100%;display:flex;flex-direction:column;gap:14px;margin-top:26px}
  .lnk{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:17px 18px;
    border-radius:30px;text-decoration:none;font-weight:700;font-size:16px;text-align:center;
    transition:transform .15s, box-shadow .15s, filter .15s;position:relative}
  .lnk:hover{transform:translateY(-2px)}
  .lnk:active{transform:translateY(0)}
  .lnk svg{width:20px;height:20px;flex:none}
  .lnk .txt{display:flex;flex-direction:column;align-items:center;line-height:1.2}
  .lnk .txt small{font-weight:600;font-size:12px;opacity:.75;margin-top:1px}
  .lnk.glass{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.30);color:#fff;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .lnk.glass:hover{background:rgba(255,255,255,.18)}
  .lnk.solid{box-shadow:0 10px 26px rgba(0,0,0,.22)}
  .lnk.solid:hover{filter:brightness(1.05)}

  /* redes sociais */
  .social{display:flex;gap:14px;margin-top:26px}
  .social a{width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.2);display:grid;place-items:center;color:#fff;transition:.15s}
  .social a:hover{background:rgba(255,255,255,.24);transform:translateY(-2px)}
  .social svg{width:22px;height:22px}
  footer{margin-top:30px;font-size:12px;opacity:.6;text-align:center}
  @media(max-width:360px){.logo{width:96px;height:96px}h1{font-size:22px}}
</style>
</head>
<body>
  <main class="col">
    <div class="logo" id="logo">
      <svg viewBox="0 0 100 100" fill="#fff"><path d="M50 8c-19 0-34 15-34 34 0 24 34 50 34 50s10-8 18-18L54 50a4 4 0 10-9-6L34 42c0-9 7-16 16-16 4 0 8 1 11 4l7-9C63 12 57 8 50 8z"/><path d="M62 20l6-8 4 12 12 3-11 6z"/></svg>
    </div>
    <h1 id="name">JORNADA360</h1>
    <div class="tag" id="tag">AGÊNCIA DE VIAGEM</div>
    <p class="bio">Realizamos o sonho da sua viagem — pacotes com aéreo + hospedagem, saindo de Rio Preto. ✈️</p>
    <span class="live" id="badge"><span class="dot"></span> <span id="badgeTxt">PROMOÇÕES ATIVAS AGORA</span></span>

    <nav class="links" id="links"></nav>

    <div class="social" id="social"></div>

    <footer>© <span id="year"></span> Jornada360 · Agência de Viagem</footer>
  </main>

<script>
const ICONS={
  spark:'<path d="M12 3l1.8 4.2L18 9l-4.2 1.8L12 15l-1.8-4.2L6 9l4.2-1.8z"/><path d="M18.5 14l.7 1.8 1.8.7-1.8.7-.7 1.8-.7-1.8-1.8-.7 1.8-.7z"/>',
  bell:'<path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/>',
  fire:'<path d="M12 2s5 4 5 9a5 5 0 01-10 0c0-2 1-3 1-3s0 2 2 2c0-3 2-5 2-8z"/>',
  wa:'<path d="M12 2a10 10 0 00-8.5 15.2L2 22l4.9-1.5A10 10 0 1012 2z"/>',
  ig:'<rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/>',
  map:'<path d="M12 21s-7-6.2-7-11a7 7 0 0114 0c0 4.8-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/>',
  mail:'<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/>',
  doc:'<path d="M14 3H6a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V9z"/><path d="M14 3v6h6"/>',
  link:'<path d="M10 13a5 5 0 007 0l2-2a5 5 0 00-7-7l-1 1"/><path d="M14 11a5 5 0 00-7 0l-2 2a5 5 0 007 7l1-1"/>',
  arrow:'<path d="M9 6l6 6-6 6"/>'
};
const svg=(p,fill)=>`<svg viewBox="0 0 24 24" fill="${fill||'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
function rgbOf(hex){hex=(hex||'#08518b').replace('#','');if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');
  return [parseInt(hex.slice(0,2),16),parseInt(hex.slice(2,4),16),parseInt(hex.slice(4,6),16)];}
function textOn(hex){const[r,g,b]=rgbOf(hex);return (0.299*r+0.587*g+0.114*b)>165?'#152230':'#ffffff';}
function adjust(hex,amt){const c=rgbOf(hex).map(v=>Math.max(0,Math.min(255,v+amt)));return `rgb(${c[0]},${c[1]},${c[2]})`;}

async function init(){
  document.getElementById('year').textContent=new Date().getFullYear();
  let s={};
  try{const r=await sb.from('settings').select('data').eq('id',1).maybeSingle();s=(r.data&&r.data.data)||{};}catch(e){}
  if(s.name)document.getElementById('name').textContent=s.name;
  if(s.tag)document.getElementById('tag').textContent=s.tag;
  if(s.logo)document.getElementById('logo').innerHTML=`<img src="${s.logo}" alt="logo">`;
  if(s.bioBio)document.querySelector('.bio').textContent=s.bioBio;
  if(s.bioBadge!==undefined){const b=document.getElementById('badge');
    if(s.bioBadge){document.getElementById('badgeTxt').textContent=s.bioBadge;}else{b.style.display='none';}}
  const wa=(s.wa||'').replace(/\D/g,'');
  // fundo com foto (véu azul por cima pra legibilidade)
  if(s.bioBg){document.body.style.background=
    `linear-gradient(180deg, rgba(6,40,68,.66), rgba(4,28,48,.88)), url("${s.bioBg}") center/cover fixed`;}

  const resolve=u=>u==='wa'?(wa?`https://wa.me/${wa}?text=${encodeURIComponent('Olá! Vim pelo link da bio 😊')}`:''):(u==='/'?'/':u);
  const links=(s.bioLinks&&s.bioLinks.length?s.bioLinks:[]).filter(l=>resolve(l.url));
  document.getElementById('links').innerHTML=links.map(l=>{
    const url=resolve(l.url),ext=url.startsWith('http');
    let cls='glass',style='';
    if(l.style==='solid'){const bg=l.color||'#08518b',fg=textOn(bg);
      cls='solid';style=`background:linear-gradient(135deg, ${adjust(bg,22)}, ${adjust(bg,-6)});color:${fg}`;}
    return `<a class="lnk ${cls}" style="${style}" href="${url}" ${ext?'target="_blank" rel="noopener"':''}>
      ${svg(ICONS[l.icon]||ICONS.link)}
      <span class="txt">${l.title||''}${l.sub?`<small>${l.sub}</small>`:''}</span>
    </a>`;}).join('');

  // redes no rodapé (whatsapp + instagram, se houver)
  const ig=(s.bioLinks||[]).find(l=>l.icon==='ig');
  const soc=[];if(wa)soc.push({url:`https://wa.me/${wa}`,icon:'wa'});if(ig&&ig.url)soc.push({url:ig.url,icon:'ig'});
  document.getElementById('social').innerHTML=soc.map(x=>`<a href="${x.url}" target="_blank" rel="noopener">${svg(ICONS[x.icon])}</a>`).join('');
}
init();
</script>
</body>
